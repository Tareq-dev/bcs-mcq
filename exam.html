<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCS Pro | Live Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 font-sans text-slate-800">
    <header
      class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-200 z-50 p-4 shadow-sm"
    >
      <div class="max-w-2xl mx-auto flex justify-between items-center">
        <div>
          <h1 class="font-bold text-lg">BCS Model Test 45</h1>
          <p class="text-[10px] text-slate-500 uppercase tracking-widest">
            Category: Bangladesh Affairs • 50 Questions
          </p>
        </div>
        <div
          id="timer"
          class="bg-slate-900 text-white px-4 py-1.5 rounded-full font-mono font-bold text-sm"
        >
          00:00
        </div>
      </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 py-8">
      <div
        id="start-screen"
        class="text-center py-20 bg-white rounded-3xl shadow-sm border border-slate-100"
      >
        <h2 class="text-2xl font-bold mb-2">Ready to start?</h2>
        <p class="text-slate-500 mb-8">Time limit: 20 minutes | 50 Questions</p>
        <button
          onclick="startExam()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-full font-bold transition"
        >
          Start Exam
        </button>
      </div>

      <div id="quiz-area" class="hidden space-y-6">
        <div id="quiz-container"></div>
        <div class="flex justify-between pt-6">
          <button
            onclick="prevPage()"
            id="prevBtn"
            class="text-slate-400 font-bold hover:text-slate-800"
          >
            Previous
          </button>
          <button
            onclick="nextPage()"
            id="nextBtn"
            class="bg-blue-600 text-white px-8 py-2 rounded-full font-bold"
          >
            Next
          </button>
        </div>
      </div>
    </main>

    <div
      id="result-popup"
      class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4"
    >
      <div class="bg-white p-8 rounded-3xl text-center max-w-sm w-full">
        <div class="text-5xl mb-4">🎉</div>
        <h3 class="text-2xl font-bold mb-2">Exam Completed!</h3>
        <p class="text-slate-500 mb-6">
          Your answers have been submitted successfully.
        </p>
        <button
          onclick="location.reload()"
          class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold"
        >
          Close
        </button>
      </div>
    </div>

    <script>
      let timeLeft = 1200; // 20 minutes
      const timerDisplay = document.getElementById("timer");

      function startExam() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("quiz-area").classList.remove("hidden");
        renderQuestions();

        const timer = setInterval(() => {
          let m = Math.floor(timeLeft / 60);
          let s = timeLeft % 60;
          timerDisplay.innerText = `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
          if (timeLeft <= 0) {
            clearInterval(timer);
            showResult();
          }
          timeLeft--;
        }, 1000);
      }

      // Logic (Pagination & Rendering)
      const questions = Array.from({ length: 50 }, (_, i) => ({
        id: i + 1,
        q: `: বাংলাদেশের জাতীয় কবি কে?`,
        options: ["কাজী নজরুল", "রবীন্দ্রনাথ", "জসীমউদ্দীন", "সুকান্ত"],
      }));
      let currentPage = 0;

      function renderQuestions() {
        const container = document.getElementById("quiz-container");
        container.innerHTML = questions
          .slice(currentPage * 10, (currentPage + 1) * 10)
          .map(
            (item) => `
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="font-medium text-sm mb-4">${item.id}. ${item.q}</p>
                    <div class="grid grid-cols-2 gap-2">
                        ${item.options.map((opt) => `<button class="text-left text-xs p-3 border rounded-xl hover:border-blue-500 transition">${opt}</button>`).join("")}
                    </div>
                </div>
            `,
          )
          .join("");
        document.getElementById("nextBtn").innerText =
          currentPage >= 4 ? "Finish Exam" : "Next";
      }

      function nextPage() {
        if (currentPage < 4) {
          currentPage++;
          renderQuestions();
        } else {
          showResult();
        }
      }

      function showResult() {
        document.getElementById("result-popup").classList.remove("hidden");
      }

      document.addEventListener("DOMContentLoaded", function () {
        fetch("sidebar.html")
          .then((response) => {
            if (!response.ok) {
              throw new Error("Sidebar file not found!");
            }
            return response.text();
          })
          .then((data) => {
            document.getElementById("sidebar-container").innerHTML = data;
          })
          .catch((error) => console.error("Error loading sidebar:", error));
      });
    </script>
  </body>
</html>
